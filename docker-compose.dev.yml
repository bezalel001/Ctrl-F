services:
  frontend:
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: development
      SEED_DEMO_SOURCES: ${SEED_DEMO_SOURCES:-true}

volumes:
  frontend_node_modules:
